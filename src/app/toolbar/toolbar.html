<div class="card">

    <div class="toolbar">
        <input
        class="form-control"
        placeholder="Search…"
        [ngModel]="search()"
        (ngModelChange)="setSearch($event)"
        />

        <button class="btn btn-primary" type="button" (click)="clear()">Clear</button>
        <button class="btn btn-primary" type="button" (click)="add()">Add</button>

        <div><app-tour-form></app-tour-form></div>


    </div>

      
</div>
